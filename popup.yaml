            RadiusBottomRight: =10
            RadiusTopLeft: =10
            RadiusTopRight: =10
            Width: |
              =700
          Children:
            - cntBackBtn:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Height: =55
                  LayoutAlignItems: =LayoutAlignItems.Center
